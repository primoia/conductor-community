server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker must not be cached
    location /ngsw-worker.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /ngsw.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Media Studio PWA — dedicated HTML with Primo manifest
    location = /jarvis {
        add_header Cache-Control "no-cache";
        try_files /jarvis.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vocall (ex-Jarvis) Voice WebSocket proxy → vocall-dev on 192.168.0.214
    # Regex capture to forward full path (e.g. /jarvis/ws/stream → /ws/stream)
    location ~ ^/jarvis/ws/(.*)$ {
        resolver 127.0.0.11 valid=30s;
        set $vocall_upstream http://192.168.0.214:12902;
        proxy_pass $vocall_upstream/ws/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # Vocall (ex-Jarvis) Voice API proxy → vocall-dev on 192.168.0.214
    # Regex capture to forward full path (e.g. /jarvis/api/v1/config → /api/v1/config)
    location ~ ^/jarvis/api/(.*)$ {
        resolver 127.0.0.11 valid=30s;
        set $vocall_upstream http://192.168.0.214:12902;
        proxy_pass $vocall_upstream/api/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://community-conductor-bff:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    location /mcp/ {
        proxy_pass http://community-conductor-bff:8080/mcp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://community-conductor-bff:8080/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1800s;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
    }
}
